services:
  # --- Infrastructure ---
  redis:
    image: redis:7-alpine
    container_name: performa-redis
    restart: unless-stopped
    command: redis-server --maxmemory 48mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - performa

  # --- HLS Conversion ---
  hls-api:
    image: ${ECR_REGISTRY}/performa-dev/hls-api:${IMAGE_TAG:-latest}
    container_name: performa-hls-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      API_KEY: ${HLS_API_KEY:-}
    volumes:
      - hls_temp:/tmp/hls_converter
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - performa

  hls-worker:
    image: ${ECR_REGISTRY}/performa-dev/hls-worker:${IMAGE_TAG:-latest}
    container_name: performa-hls-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    volumes:
      - hls_temp:/tmp/hls_converter
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - performa

